spring.application.name=Health-Info
spring.config.import=optional:file:.env[.properties]

# Database - Local PostgreSQL
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Ollama local LLM
ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
ollama.model=${OLLAMA_MODEL:deepseek-r1:7b}

# Server
server.port=${PORT:8083}
server.address=0.0.0.0

# PDF Upload Storage
app.upload.pdf-dir=${PDF_UPLOAD_DIR:uploads/pdfs}

# Allow large PDF uploads (up to 50 MB)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=52MB
